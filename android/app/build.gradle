plugins {
  id "com.android.application"

  id "kotlin-android"
  id "dev.flutter.flutter-gradle-plugin"
}

def localProperties = new java.util.Properties()
rootProject.file('local.properties').withInputStream {
  localProperties.load(it)
}

def flutterVersionCode = localProperties.getProperty('flutter.versionCode')
def flutterVersionName = localProperties.getProperty('flutter.versionName')
def buildNumber = System.getenv("BUILD_NUMBER") ?: "0"
def keystoreProperties = new Properties()
def keystorePropertiesFile = rootProject.file('key.properties')
if (keystorePropertiesFile.exists()) {
  keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
}

android {
  namespace "com.trackmauzo.app"

  compileSdkVersion flutter.compileSdkVersion
  ndkVersion "28.2.13676358"

  compileOptions {
    sourceCompatibility JavaVersion.VERSION_17
    targetCompatibility JavaVersion.VERSION_17
  }

  kotlinOptions {
    jvmTarget = "17"
  }

  sourceSets {
    main.java.srcDirs += 'src/main/kotlin'
  }

  defaultConfig {
    applicationId "com.trackmauzo.app"

    minSdkVersion flutter.minSdkVersion
    targetSdkVersion flutter.targetSdkVersion

    multiDexEnabled true

    versionCode flutterVersionCode.toInteger()
    versionName flutterVersionName
  }

  signingConfigs {
    release {
      if (keystorePropertiesFile.exists()) {
        keyAlias keystoreProperties['keyAlias']
        keyPassword keystoreProperties['keyPassword']
        storeFile keystoreProperties['storeFile'] ? file(keystoreProperties['storeFile']) : null
        storePassword keystoreProperties['storePassword']
      }
    }
  }

  buildTypes {

    release {
      minifyEnabled false
      shrinkResources false

      signingConfig keystorePropertiesFile.exists() ? signingConfigs.release : signingConfigs.debug
    }

    debug {
      debuggable true

      minifyEnabled false
      shrinkResources false

      signingConfig signingConfigs.debug
    }
  }

  flavorDimensions "mode"

  productFlavors {

    prod {
      dimension "mode"
    }

    dev {
      dimension "mode"
      versionNameSuffix "-dev+" + buildNumber
    }
  }

  lintOptions {
    disable 'InvalidPackage'
    checkReleaseBuilds false
  }
}

flutter {
  source '../..'
}

dependencies {
  implementation "androidx.multidex:multidex:2.0.1"
}
